name: SRE Automation Project

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run_health_check:     # This is the "Parent"
    runs-on: ubuntu-latest
    steps:              # This must be indented 4 spaces (under the job)
      - name: Grab my code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install requests

      - name: Run the Script
        run: python check_site.py
        